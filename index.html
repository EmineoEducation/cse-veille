<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>CSE Veille — Pôle Santé Confluences · Éminéo</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
  --ink: #14171f;
  --ink-soft: #2a3142;
  --ink-mute: #5b6473;
  --ink-faint: #9aa0ae;
  --rule: rgba(20,24,36,0.10);
  --accent: #1a3a2e;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans);
  color: var(--ink);
  background: #0d2018;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }
input, textarea { font-family: inherit; }
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: rgba(20,24,36,.18); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: rgba(20,24,36,.32); background-clip: padding-box; border: 2px solid transparent; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}
@keyframes slideInNotif {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: none; }
}
@keyframes dock-bounce {
  0%,100%{transform:translateY(0) scale(1)} 20%{transform:translateY(-18px) scale(1.1)}
  40%{transform:translateY(-4px) scale(1.02)} 60%{transform:translateY(-10px) scale(1.06)}
  80%{transform:translateY(-2px) scale(1.01)}
}
.dock-bounce { animation: dock-bounce 0.9s ease 3; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="app-mail.jsx"></script>
<script type="text/babel" src="app-pdf.jsx"></script>
<script type="text/babel" src="app-notes.jsx"></script>
<script type="text/babel" src="app-browser.jsx"></script>
<script type="text/babel" src="app-livrable.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="main.jsx"></script>
</body>
</html>
